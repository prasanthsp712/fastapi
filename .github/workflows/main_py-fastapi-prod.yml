# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

# .github/workflows/deploy.yml
name: FastAPI Azure Deployment

on:
push:
branches:
- main

jobs:

deploy-staging:
name: Deploy to Staging
runs-on: ubuntu-latest
environment:
name: staging

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Deploy to Azure Web App (staging slot)
    uses: azure/webapps-deploy@v2
    with:
      app-name: py-fastapi-prod
      slot-name: staging
      publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_69F45359EEE6447D97A74D6FA8CECEAC }}
      package: .
```

deploy-production:
name: Swap to Production (Approval Required)
needs: deploy-staging
runs-on: ubuntu-latest
environment:
name: production

```
steps:
  - name: Swap staging slot to production
    uses: azure/webapps-deploy@v2
    with:
      app-name: py-fastapi-prod
      slot-name: staging
      publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_69F45359EEE6447D97A74D6FA8CECEAC }}
```
