# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

# .github/workflows/deploy.yml
name: FastAPI Azure Deployment

on:
  push:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: prasanth-fastapi-app
  RESOURCE_GROUP: fastapi-rg
  SLOT: staging

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Archive App
        run: zip -r app.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: fastapi
          path: app.zip

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fastapi

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          package: app.zip

  pre-swap-approval:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - run: echo "Waiting for approval before slot swap"

  swap-slot:
    needs: pre-swap-approval
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap slots
        run: |
          az webapp deployment slot swap \
          --resource-group $RESOURCE_GROUP \
          --name $AZURE_WEBAPP_NAME \
          --slot staging \
          --target-slot production

  post-deploy-approval:
    needs: swap-slot
    runs-on: ubuntu-latest
    environment: production

    steps:
      - run: echo "Production deployment verified"
