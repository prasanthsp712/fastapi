# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

# .github/workflows/deploy.yml
name: FastAPI Azure Deployment

on:
push:
branches:
- main

env:
AZURE_WEBAPP_NAME: py-fastapi-prod
RESOURCE_GROUP: fastapi-py1

jobs:

deploy-staging:
name: Deploy to Staging Slot
runs-on: ubuntu-latest
environment: staging

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Deploy FastAPI to Azure (staging)
    uses: azure/webapps-deploy@v2
    with:
      app-name: ${{ env.AZURE_WEBAPP_NAME }}
      slot-name: staging
      publish-profile: ${{ AZUREAPPSERVICE_PUBLISHPROFILE_69F45359EEE6447D97A74D6FA8CECEAC }}
      package: .
```

approval-before-swap:
name: Production Approval
needs: deploy-staging
runs-on: ubuntu-latest
environment: production

```
steps:
  - name: Waiting for production approval
    run: echo "Waiting for reviewer approval before production deployment"
```

swap-to-production:
name: Swap Staging to Production
needs: approval-before-swap
runs-on: ubuntu-latest

```
steps:
  - name: Azure Login
    uses: azure/login@v1
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Swap staging slot to production
    run: |
      az webapp deployment slot swap \
        --resource-group ${{ env.RESOURCE_GROUP }} \
        --name ${{ env.AZURE_WEBAPP_NAME }} \
        --slot staging \
        --target-slot production
```

